<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convertidor</title>

<style>
:root {
  --bg: #0d0d0d;
  --card: #1c1c1c;
  --input: #2a2a2a;
  --border: #333;
  --text: #fff;
  --muted: #aaa;
  --accent: #4ade80;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: system-ui, Arial;
  background: var(--bg);
  color: var(--text);
}

/* APP LAYOUT */
.app {
  height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* HEADER FIJO */
.header {
  height: 60px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  padding: 0 16px;
  background: #111;
  border-bottom: 1px solid #222;
  font-weight: bold;
  font-size: 18px;
}

/* CONTENIDO */
.main {
  flex: 1;
  display: flex;
  gap: 12px;
  padding: 12px;
  overflow: hidden; /* 🔥 clave */
}

/* PANEL */
.panel {
  flex: 1;
  background: var(--card);
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  overflow: hidden; /* 🔥 evita desbordes */
}

/* SCROLL INTERNO */
.panel-content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

/* TITULOS */
h3 {
  margin: 0 0 10px;
  font-size: 18px;
}

/* LABELS */
label {
  font-size: 13px;
  color: var(--muted);
  margin-top: 10px;
  display: block;
}

/* INPUTS */
input, select, button {
  width: 100%;
  height: 48px;
  margin-top: 6px;
  padding: 0 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--input);
  color: var(--text);
  font-size: 16px;
}

/* BOTONES */
button {
  font-weight: bold;
  cursor: pointer;
}

button:active {
  transform: scale(0.97);
}

.row {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.row button {
  flex: 1;
}

/* RESULTADOS */
.result {
  margin-top: 16px;
  font-size: 24px;
  font-weight: bold;
  color: var(--accent);
}

.result-GC {
  font-size: 14px;
  color: #fffb00;
  text-align: right;
}

.timer {
  font-size: 26px;
  text-align: center;
  margin-top: 12px;
}

#rate {
  margin-top: 10px;
  color: var(--muted);
  font-size: 13px;
}

/* MOBILE */
@media (max-width: 768px) {
  .main {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    Convertidor / Farm Tracker
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- PANEL IZQUIERDO -->
    <div class="panel">
      <div class="panel-content">

        <h3>Convertidor</h3>

        <label>Game Currency (GC)</label>
        <input type="number" id="gc" value="1000000">

        <label>Precio total</label>
        <input type="number" id="price" value="1" step="0.01">

        <label>Moneda</label>
        <select id="currency">
      <option value="USD">USD - Dólar</option>
      <option value="MXN">MXN - Peso mexicano</option>
      <option value="VES">VES - Bolívar venezolano</option>
      <option value="ARS">ARS - Peso argentino</option>
      <option value="COP">COP - Peso colombiano</option>
      <option value="CLP">CLP - Peso chileno</option>
      <option value="PEN">PEN - Sol peruano</option>
      <option value="BRL">BRL - Real brasileño</option>
      <option value="UYU">UYU - Peso uruguayo</option>
      <option value="PYG">PYG - Guaraní paraguayo</option>
      <option value="BOB">BOB - Boliviano</option>
      <option value="DOP">DOP - Peso dominicano</option>
      <option value="GTQ">GTQ - Quetzal</option>
      <option value="HNL">HNL - Lempira</option>
      <option value="NIO">NIO - Córdoba</option>
      <option value="CRC">CRC - Colón</option>
      <option value="EUR">EUR - Euro</option>
      <option value="GBP">GBP - Libra</option>
      <option value="JPY">JPY - Yen</option>
        </select>

        <div id="rate">Cargando tipo de cambio...</div>
        <div class="result" id="result">0.00 USD</div>

      </div>
    </div>

    <!-- PANEL DERECHO -->
    <div class="panel">
      <div class="panel-content">

        <h3>Sesión</h3>

        <label>GC farmeado</label>
        <input type="number" id="farmedGC" placeholder="Ej: 10000">

        <div class="timer" id="timer">00:00:00</div>

        <div class="row">
          <button id="startPause">Start</button>
          <button id="reset">Reset</button>
        </div>

        <div class="result-GC" id="gcPerHour">0 GC/h</div>
        <div class="result-GC" id="perHour">0.00 USD/h</div>
        <div class="result" id="farmResult">0.00 USD</div>

      </div>
    </div>

  </div>
</div>

<script>
let rate = 1;

// TIMER
let seconds = 0;
let running = false;
let interval = null;

function formatTime(sec) {
  const h = String(Math.floor(sec / 3600)).padStart(2, '0');
  const m = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
  const s = String(sec % 60).padStart(2, '0');
  return `${h}:${m}:${s}`;
}

function updateTimer() {
  document.getElementById("timer").innerText = formatTime(seconds);
}

function toggleTimer() {
  running = !running;

  if (running) {
    document.getElementById("startPause").innerText = "Pause";
    interval = setInterval(() => {
      seconds++;
      updateTimer();
      calcularTodo();
    }, 1000);
  } else {
    document.getElementById("startPause").innerText = "Start";
    clearInterval(interval);
  }
}

function resetSession() {
  seconds = 0;
  document.getElementById("farmedGC").value = "";
  updateTimer();
  calcularTodo();
}

// CONVERSION
async function getRate() {
  const currency = document.getElementById("currency").value;

  try {
    const res = await fetch("https://open.er-api.com/v6/latest/USD");
    const data = await res.json();

    rate = data.rates[currency];

    document.getElementById("rate").innerText =
      `1 USD = ${rate} ${currency}`;

    calcularTodo();
  } catch {
    document.getElementById("rate").innerText =
      "Error al cargar tipo de cambio";
  }
}

function calcularBase() {
  const price = parseFloat(document.getElementById("price").value) || 0;
  return price / rate;
}

function calcularFarm() {
  const farmedGC = parseFloat(document.getElementById("farmedGC").value) || 0;
  const baseGC = parseFloat(document.getElementById("gc").value) || 1;
  const price = parseFloat(document.getElementById("price").value) || 0;

  return ((farmedGC * price) / baseGC) / rate;
}

function calcularTodo() {
  const usdBase = calcularBase();
  const usdFarm = calcularFarm();
  const farmedGC = parseFloat(document.getElementById("farmedGC").value) || 0;

  document.getElementById("result").innerText =
    `${usdBase.toFixed(2)} USD`;

  document.getElementById("farmResult").innerText =
    `${usdFarm.toFixed(2)} USD`;

  let usdPerHour = 0;
  let gcPerHour = 0;

  if (seconds > 0) {
    const hours = seconds / 3600;
    usdPerHour = usdFarm / hours;
    gcPerHour = farmedGC / hours;
  }

  document.getElementById("perHour").innerText =
    `${usdPerHour.toFixed(2)} USD/h`;

  document.getElementById("gcPerHour").innerText =
    `${gcPerHour.toFixed(0)} GC/h`;
}

// EVENTOS
["gc","price","farmedGC"].forEach(id =>
  document.getElementById(id).addEventListener("input", calcularTodo)
);

document.getElementById("currency").addEventListener("change", getRate);
document.getElementById("startPause").addEventListener("click", toggleTimer);
document.getElementById("reset").addEventListener("click", resetSession);

// init
updateTimer();
getRate();
</script>

</body>
</html>
